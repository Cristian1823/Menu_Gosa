<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOSA - Para Pago</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="sistema.css">
    <style>
        .pago-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px 25px;
            border: 1px solid var(--gray-dark);
            text-align: center;
        }

        .stat-numero {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5em;
            line-height: 1;
        }

        .stat-numero.pendiente { color: var(--warning); }
        .stat-numero.cobrado { color: var(--success); }

        .stat-label {
            font-size: 0.9em;
            color: var(--gray-light);
            margin-top: 5px;
        }

        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--gray-light);
            font-size: 0.9em;
        }

        .auto-refresh input {
            accent-color: var(--gold);
        }

        .btn-cobrado {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #28a745, #1e7e34);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2em;
            letter-spacing: 1px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-cobrado:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="sistema-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="images/logo.jpeg" alt="GOSA Logo" class="logo">
            <h1><i class="fas fa-cash-register"></i> PARA PAGO</h1>
        </div>
        <nav class="header-nav">
            <a href="pedidos.html" class="nav-btn">Pedidos</a>
            <a href="cocina.html" class="nav-btn">Cocina</a>
            <a href="domicilio.html" class="nav-btn active">Para Pago</a>
            <a href="cierre.html" class="nav-btn">Cierre</a>
            <a href="clientes.html" class="nav-btn">Clientes</a>
            <a href="inventario.html" class="nav-btn">Inventario</a>
            <a href="index.html" class="nav-btn">Menu</a>
        </nav>
    </header>

    <!-- Contenido -->
    <div class="cocina-container">
        <!-- Estadísticas -->
        <div class="pago-stats" id="stats">
            <div class="stat-box">
                <div class="stat-numero pendiente" id="statPendientes">0</div>
                <div class="stat-label">Por cobrar</div>
            </div>
            <div class="stat-box">
                <div class="stat-numero cobrado" id="statCobrados">0</div>
                <div class="stat-label">Cobrados hoy</div>
            </div>
            <div class="auto-refresh">
                <input type="checkbox" id="autoRefresh" checked>
                <label for="autoRefresh">Auto-actualizar cada 5s</label>
            </div>
        </div>

        <!-- Grid de Pedidos Listos -->
        <div class="cocina-grid" id="pedidosGrid">
            <div class="loading">Cargando pedidos listos</div>
        </div>
    </div>

    <script src="sistema.js"></script>
    <script>
        // ========== VARIABLES ==========
        let pedidosActuales = [];
        let intervaloRefresh = null;
        let ultimoPedidoId = 0;

        // ========== HELPERS TIPO PEDIDO ==========
        function getTipoPedido(notas) {
            if (!notas) return null;
            if (notas.includes('[PARA LLEVAR]')) return 'llevar';
            if (notas.includes('[PARA COMER ACA]')) return 'comer';
            if (notas.includes('[DOMICILIO]')) return 'domicilio';
            return null;
        }

        function limpiarNotas(notas) {
            if (!notas) return '';
            return notas.replace('[PARA LLEVAR]', '').replace('[PARA COMER ACA]', '').replace('[DOMICILIO]', '').trim();
        }

        function badgeTipo(notas) {
            const tipo = getTipoPedido(notas);
            if (tipo === 'llevar') return '<div class="tipo-badge llevar"><i class="fas fa-bag-shopping"></i> PARA LLEVAR</div>';
            if (tipo === 'comer') return '<div class="tipo-badge comer"><i class="fas fa-utensils"></i> PARA COMER ACÁ</div>';
            if (tipo === 'domicilio') return '<div class="tipo-badge domicilio"><i class="fas fa-motorcycle"></i> DOMICILIO</div>';
            return '';
        }

        // ========== INICIALIZACIÓN ==========
        document.addEventListener('DOMContentLoaded', function() {
            if (!GOSA.apiConfigurada()) {
                GOSA.mostrarConfigPendiente(document.getElementById('pedidosGrid'));
                return;
            }
            cargarPedidos();

            document.getElementById('autoRefresh').addEventListener('change', toggleAutoRefresh);
            toggleAutoRefresh();
        });

        // ========== TOGGLE AUTO-REFRESH ==========
        function toggleAutoRefresh() {
            if (intervaloRefresh) {
                clearInterval(intervaloRefresh);
                intervaloRefresh = null;
            }
            if (document.getElementById('autoRefresh').checked) {
                intervaloRefresh = setInterval(cargarPedidos, 5000);
            }
        }

        // ========== CARGAR PEDIDOS ==========
        async function cargarPedidos() {
            try {
                const resultado = await GOSA.getPedidosHoy();
                if (resultado.error) throw new Error(resultado.error);

                const hoy = GOSA.fechaHoy();
                const todosHoy = (resultado.pedidos || []).filter(p => p.fecha === hoy);

                // Listos para cobrar
                const listos = todosHoy.filter(p => p.estado === 'listo');

                // Ya cobrados/entregados hoy (estadística)
                const cobrados = todosHoy.filter(p => p.estado === 'entregado');

                // Notificación de nuevos pedidos listos
                const nuevos = listos.filter(p => p.id > ultimoPedidoId);
                if (nuevos.length > 0 && ultimoPedidoId > 0) {
                    GOSA.reproducirSonido('nuevo');
                    GOSA.vibrar(300);
                }
                if (listos.length > 0) {
                    ultimoPedidoId = Math.max(...listos.map(p => p.id));
                }

                pedidosActuales = listos;

                // Estadísticas
                document.getElementById('statPendientes').textContent = listos.length;
                document.getElementById('statCobrados').textContent = cobrados.length;

                renderizarPedidos(listos);

            } catch (error) {
                console.error('Error cargando pedidos:', error);
                document.getElementById('pedidosGrid').innerHTML = `
                    <div class="mensaje error">Error al cargar: ${error.message}</div>
                `;
            }
        }

        // ========== RENDERIZAR PEDIDOS ==========
        function renderizarPedidos(pedidos) {
            const grid = document.getElementById('pedidosGrid');

            if (pedidos.length === 0) {
                grid.innerHTML = `
                    <div class="sin-datos">
                        <i class="fas fa-check-circle"></i>
                        No hay pedidos listos por cobrar
                    </div>
                `;
                return;
            }

            // Ordenar por ID (más antiguos primero)
            pedidos.sort((a, b) => a.id - b.id);

            grid.innerHTML = pedidos.map(pedido => {
                return `
                    <div class="pedido-card listo">
                        <div class="pedido-header">
                            <div>
                                <div class="pedido-numero">#${pedido.id}</div>
                                <div class="pedido-hora">
                                    <i class="fas fa-clock"></i> ${formatearHora(pedido.hora)}
                                </div>
                            </div>
                            <span class="pedido-estado listo">LISTO</span>
                        </div>

                        ${badgeTipo(pedido.notas)}

                        <div class="pedido-lista">
                            ${pedido.items.map(item => `
                                <div class="pedido-lista-item">
                                    <span>
                                        <span class="item-cantidad">${item.cantidad}x</span>
                                        <span class="item-nombre">${item.nombre}</span>
                                    </span>
                                </div>
                            `).join('')}
                        </div>

                        <div class="pedido-total">
                            <div class="total-linea">
                                <span>TOTAL:</span>
                                <span>${GOSA.formatearPrecio(pedido.total)}</span>
                            </div>
                        </div>

                        ${limpiarNotas(pedido.notas) ? `
                            <div class="pedido-notas-cocina">
                                <i class="fas fa-comment"></i> ${limpiarNotas(pedido.notas)}
                            </div>
                        ` : ''}

                        <div class="pedido-acciones">
                            <button class="btn-cobrado" onclick="marcarCobrado(${pedido.id})">
                                <i class="fas fa-circle-check"></i> COBRADO
                            </button>
                            <button class="btn-eliminar-pedido" onclick="pedirPinEliminar(${pedido.id})" title="Eliminar pedido">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ========== FORMATEAR HORA ==========
        function formatearHora(hora) {
            if (!hora) return '--:--';
            if (hora.match(/^\d{2}:\d{2}:\d{2}$/)) return hora.substring(0, 5);
            if (hora.includes('GMT') || hora.includes('T')) {
                try { return new Date(hora).toTimeString().substring(0, 5); }
                catch(e) { return '--:--'; }
            }
            if (hora.match(/^\d{2}:\d{2}$/)) return hora;
            return String(hora).substring(0, 5);
        }

        // ========== MARCAR COMO COBRADO ==========
        async function marcarCobrado(id) {
            GOSA.vibrar();

            const cards = document.querySelectorAll('.pedido-card');
            cards.forEach(card => {
                if (card.querySelector('.pedido-numero').textContent === `#${id}`) {
                    card.style.opacity = '0.5';
                    card.style.pointerEvents = 'none';
                }
            });

            try {
                const resultado = await GOSA.actualizarEstadoPedido(id, 'entregado');
                if (resultado.success) {
                    GOSA.reproducirSonido('success');
                    await cargarPedidos();
                } else {
                    throw new Error(resultado.error || 'Error desconocido');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error al actualizar: ' + error.message);
                await cargarPedidos();
            }
        }

        // ========== ELIMINAR PEDIDO CON PIN ==========
        let _pedidoAEliminar = null;

        function pedirPinEliminar(id) {
            _pedidoAEliminar = id;
            document.getElementById('pinEliminarInputs').querySelectorAll('input').forEach(i => i.value = '');
            document.getElementById('pinEliminarError').style.display = 'none';
            document.getElementById('modalPinEliminar').style.display = 'flex';
            document.getElementById('pinEliminarInputs').querySelector('input').focus();
        }

        function cerrarPinEliminar() {
            document.getElementById('modalPinEliminar').style.display = 'none';
            _pedidoAEliminar = null;
        }

        function avanzarPinEliminar(el) {
            const inputs = Array.from(document.getElementById('pinEliminarInputs').querySelectorAll('input'));
            const idx = inputs.indexOf(el);
            if (el.value && idx < inputs.length - 1) inputs[idx + 1].focus();
            if (inputs.every(i => i.value)) validarPinEliminar();
        }

        async function validarPinEliminar() {
            const inputs = document.getElementById('pinEliminarInputs').querySelectorAll('input');
            const pin = Array.from(inputs).map(i => i.value).join('');
            if (pin !== '1034') {
                document.getElementById('pinEliminarError').style.display = 'block';
                document.getElementById('pinEliminarInputs').classList.add('shake');
                setTimeout(() => {
                    document.getElementById('pinEliminarInputs').classList.remove('shake');
                    inputs.forEach(i => i.value = '');
                    inputs[0].focus();
                }, 600);
                return;
            }
            const idAEliminar = _pedidoAEliminar;
            cerrarPinEliminar();
            try {
                const res = await eliminarPedido(idAEliminar);
                if (res && res.error) throw new Error(res.error);
                await cargarPedidos();
            } catch(e) {
                alert('Error al eliminar el pedido: ' + e.message);
            }
        }
    </script>

    <!-- Modal PIN Eliminar -->
    <div id="modalPinEliminar" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:#1a1a1a; border:2px solid #dc3545; border-radius:16px; padding:32px 28px; text-align:center; max-width:320px; width:90%;">
            <div style="font-family:'Bebas Neue',sans-serif; font-size:1.4em; color:#dc3545; letter-spacing:2px; margin-bottom:6px;">🔒 ELIMINAR PEDIDO</div>
            <div style="color:#aaa; font-size:0.85rem; margin-bottom:20px;">Ingresa la clave de administrador</div>
            <div id="pinEliminarInputs" style="display:flex; gap:10px; justify-content:center; margin-bottom:12px;">
                <input type="tel" maxlength="1" pattern="[0-9]" autocomplete="off" style="width:48px;height:56px;text-align:center;font-size:1.6em;background:#111;border:2px solid #333;border-radius:8px;color:#fff;" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/,'').slice(0,1); avanzarPinEliminar(this)">
                <input type="tel" maxlength="1" pattern="[0-9]" autocomplete="off" style="width:48px;height:56px;text-align:center;font-size:1.6em;background:#111;border:2px solid #333;border-radius:8px;color:#fff;" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/,'').slice(0,1); avanzarPinEliminar(this)">
                <input type="tel" maxlength="1" pattern="[0-9]" autocomplete="off" style="width:48px;height:56px;text-align:center;font-size:1.6em;background:#111;border:2px solid #333;border-radius:8px;color:#fff;" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/,'').slice(0,1); avanzarPinEliminar(this)">
                <input type="tel" maxlength="1" pattern="[0-9]" autocomplete="off" style="width:48px;height:56px;text-align:center;font-size:1.6em;background:#111;border:2px solid #333;border-radius:8px;color:#fff;" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/,'').slice(0,1); avanzarPinEliminar(this)">
            </div>
            <div id="pinEliminarError" style="display:none; color:#dc3545; font-size:0.82rem; margin-bottom:10px;">PIN incorrecto</div>
            <button onclick="cerrarPinEliminar()" style="background:none;border:1px solid #555;color:#aaa;padding:8px 24px;border-radius:8px;cursor:pointer;font-size:0.9rem;">Cancelar</button>
        </div>
    </div>
</body>
</html>
